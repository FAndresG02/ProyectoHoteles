spring.application.name=hotel
# ===============================
# CONFIGURACIÓN DE BASE DE DATOS
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotelsbook?allowPublicKeyRetrieval=true&useSSL=false
#spring.datasource.url=jdbc:mysql://db:3306/cafeSystem
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8084

# url para imagnes
server.url=http://localhost:8084

# URL del microservicio de servicios
microservice.services.url=http://localhost:8081/api/hotels/services

# URL del microservicio de reviews
microservice.reviews.url=http://localhost:8082/api/hotels/reviews