version: "3.9"

services:

  db:
    image: mysql:8.0
    container_name: mysql-hotels
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: db_hotelsbook
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db_hotelsbook.sql:/docker-entrypoint-initdb.d/db_hotelsbook.sql
    networks:
      - hoteles-net

  services:
    image: fandresga/services:latest
    container_name: con-hotels-services
    restart: always
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_hotelsbook?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
    ports:
      - "8081:8081"
    networks:
      - hoteles-net

  reviews:
    image: fandresga/reviews:latest
    container_name: reviews-service
    restart: always
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_hotelsbook?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
    ports:
      - "8082:8082"
    networks:
      - hoteles-net

  hotels:
    image: fandresga/hotelslist:latest
    container_name: hotellslist-service
    restart: always
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_hotelsbook?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
    ports:
      - "8084:8084"
    networks:
      - hoteles-net

volumes:
  mysql_data:

networks:
  hoteles-net: